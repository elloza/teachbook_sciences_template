name: deploy-book

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Opt in early to GitHub's Node 24 runtime for JavaScript actions.
  # This avoids Node 20 deprecation warnings on official actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libcairo2-dev \
            libpango1.0-dev \
            pango1.0-tools \
            ffmpeg

      - name: Set up TeachBook environment
        run: |
          echo "n" | python scripts/setup_env.py

      - name: Install PDF toolchain (same as local full setup)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          .venv/bin/python scripts/setup_latex.py --yes --full

      - name: Generate PDF with CI/CD engine policy
        run: |
          .venv/bin/python scripts/export_pdf.py --engine auto

      - name: Build HTML book
        run: |
          .venv/bin/python scripts/build_book.py
          # FAILSAFE: Ensure .nojekyll exists even if script skipped it
          touch book/_build/html/.nojekyll

      - name: Debug Build Output
        run: |
          echo "Listing build output structure:"
          ls -R book/_build/html
          echo "Checking for .nojekyll:"
          ls -la book/_build/html/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
